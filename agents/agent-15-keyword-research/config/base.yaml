# Agent 15 - Keyword Research Agent base config (mock provider / offline CI).

provider: mock
service: agent-15-keyword-research

agent:
  id: agent-15
  name: keyword-research
  version: 0.1.0
  billable_stage: generate_keyword_strategy

llm:
  provider: mock
  tier_models:
    cheap: mock/cheap
    strong: mock/strong
  stage_tiers:
    generate_keyword_strategy: strong

quality:
  pass_threshold: 82
  approve_threshold: 88
  revise_min_threshold: 65

cost:
  ceiling_inr: 35.0
  is_mock: true
  provider_currency: USD
  fx_rates:
    USD: 83.0
  estimated_stage_cost_inr:
    generate_keyword_strategy: 5.0
  output_cost_per_token_inr:
    cheap: 0.0
    strong: 0.0
  input_cost_per_token_inr:
    cheap: 0.0
    strong: 0.0
  fixed_cost_inr:
    cheap: 0.0
    strong: 0.0
  max_prompt_tokens:
    cheap: 16384
    strong: 32768
  max_output_tokens:
    generate_keyword_strategy: 8192

telemetry:
  provider: stdout
  service: agent-15-keyword-research

object_storage:
  provider: mock
  bucket: mock-bucket
  prefix: keyword-research/

output_storage:
  enabled: false
  prefix: keyword-research/v1/

secret_store:
  provider: env
