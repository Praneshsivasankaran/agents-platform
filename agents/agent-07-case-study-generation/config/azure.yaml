provider: azure

llm:
  provider: azure
  azure_region: eastus
  tier_models:
    cheap: azure/gpt-4o-mini
    strong: azure/gpt-4o

cost:
  is_mock: false
  provider_currency: USD
  fx_rates:
    USD: 83.0
  input_cost_per_token_inr:
    cheap: 0.0
    strong: 0.0
  output_cost_per_token_inr:
