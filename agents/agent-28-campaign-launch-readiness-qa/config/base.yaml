    strong: 0.0
  input_cost_per_token_inr:
    cheap: 0.0
    strong: 0.0
  fixed_cost_inr:
    cheap: 0.0
    strong: 0.0
  max_prompt_tokens:
    cheap: 16384
    strong: 32768
  max_output_tokens:
    generate_launch_readiness_qa: 10240

telemetry:
  provider: stdout
  service: agent-28-campaign-launch-readiness-qa

object_storage:
  provider: mock
  bucket: mock-bucket
  prefix: campaign-launch-readiness-qa/

output_storage:
  enabled: false
  prefix: campaign-launch-readiness-qa/v1/

secret_store:
