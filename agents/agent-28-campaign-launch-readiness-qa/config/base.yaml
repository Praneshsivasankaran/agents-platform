# Agent 28 - Campaign Launch Readiness QA Agent base config (mock provider / offline CI).

provider: mock
service: agent-28-campaign-launch-readiness-qa

agent:
  id: agent-28
  name: campaign-launch-readiness-qa
  version: 0.1.0
  billable_stage: generate_launch_readiness_qa

