# Agent 18 - Paid Campaign Optimization Agent base config (mock provider / offline CI).

provider: mock
service: agent-18-paid-campaign-optimization

agent:
  id: agent-18
  name: paid-campaign-optimization
  version: 0.1.0
  billable_stage: generate_paid_optimization_package

llm:
  provider: mock
  tier_models:
    cheap: mock/cheap
    strong: mock/strong
  stage_tiers:
    generate_paid_optimization_package: strong

quality:
  pass_threshold: 84
  approve_threshold: 90
  revise_min_threshold: 68

cost:
  ceiling_inr: 45.0
  is_mock: true
  provider_currency: USD
  fx_rates:
    USD: 83.0
  estimated_stage_cost_inr:
    generate_paid_optimization_package: 7.0
  output_cost_per_token_inr:
    cheap: 0.0
    strong: 0.0
  input_cost_per_token_inr:
    cheap: 0.0
    strong: 0.0
  fixed_cost_inr:
    cheap: 0.0
    strong: 0.0
  max_prompt_tokens:
    cheap: 16384
    strong: 32768
  max_output_tokens:
    generate_paid_optimization_package: 8192

telemetry:
  provider: stdout
  service: agent-18-paid-campaign-optimization

object_storage:
  provider: mock
  bucket: mock-bucket
  prefix: paid-campaign-optimization/

output_storage:
  enabled: false
  prefix: paid-campaign-optimization/v1/

secret_store:
  provider: env
