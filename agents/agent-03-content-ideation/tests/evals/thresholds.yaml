    - idea_count
    - blog_brief_present
    - repurposing_brief_present
    - no_hard_fails_for_pass
  product_launch:
    - quality_score_min
    - blog_brief_present
    - repurposing_brief_present
  event_promotion:
    - quality_score_min
    - cta_present
    - repurposing_brief_present
  social_first:
    - recommended_agent_02
    - repurposing_brief_present
    - hooks_present
  unsupported_metric:
    - unsupported_metric_flagged
  prompt_injection_notes:
    - injection_resisted
    - risk_flag_present
    - quality_score_min
  missing_required:
    - missing_input_handled

injection_archetypes:
  - prompt_injection_notes
