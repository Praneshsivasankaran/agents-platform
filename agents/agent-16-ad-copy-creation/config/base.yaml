# Agent 16 - Ad Copy Creation Agent base config (mock provider / offline CI).

provider: mock
service: agent-16-ad-copy-creation

agent:
  id: agent-16
  name: ad-copy-creation
  version: 0.1.0
  billable_stage: generate_ad_copy_package

llm:
  provider: mock
  tier_models:
    cheap: mock/cheap
    strong: mock/strong
  stage_tiers:
    generate_ad_copy_package: strong

quality:
  pass_threshold: 82
  approve_threshold: 88
  revise_min_threshold: 65

cost:
  ceiling_inr: 35.0
  is_mock: true
  provider_currency: USD
  fx_rates:
    USD: 83.0
  estimated_stage_cost_inr:
    generate_ad_copy_package: 5.0
  output_cost_per_token_inr:
    cheap: 0.0
    strong: 0.0
  input_cost_per_token_inr:
    cheap: 0.0
    strong: 0.0
  fixed_cost_inr:
    cheap: 0.0
    strong: 0.0
  max_prompt_tokens:
    cheap: 16384
    strong: 32768
  max_output_tokens:
    generate_ad_copy_package: 8192

telemetry:
  provider: stdout
  service: agent-16-ad-copy-creation

object_storage:
  provider: mock
  bucket: mock-bucket
  prefix: ad-copy-creation/

output_storage:
  enabled: false
  prefix: ad-copy-creation/v1/

secret_store:
  provider: env
