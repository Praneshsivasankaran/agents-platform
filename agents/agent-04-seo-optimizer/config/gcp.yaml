# GCP / Vertex AI overlay for Agent 04. Deep-merges over base.yaml.

provider: litellm

llm:
  provider: litellm
  tier_models:
    cheap: vertex_ai/gemini-2.5-flash
    strong: vertex_ai/gemini-2.5-pro
  vertex_project_secret: VERTEX_AI_PROJECT
  vertex_location: us-central1

cost:
  is_mock: false
  provider_currency: USD
  fx_rates:
    USD: 83.0
  input_cost_per_token_inr:
    cheap: 0.0000249
    strong: 0.0001037
  output_cost_per_token_inr:
    cheap: 0.0002075
    strong: 0.0008300
  fixed_cost_inr:
    cheap: 0.0
    strong: 0.0
  ceiling_inr: 20.0
  max_prompt_tokens:
    cheap: 16384
    strong: 32768
  max_output_tokens:
    generate_metadata: 2048
    optimize_headings: 2048
    review_readability: 2048
    generate_faqs: 2048
    optimize_draft: 8192

object_storage:
  provider: gcp
  bucket_secret_key: GCS_BUCKET
  project_secret_key: VERTEX_AI_PROJECT
  prefix: seo-optimizer/v1/

output_storage:
  enabled: false
  prefix: seo-optimizer/v1/

secret_store:
  provider: env

telemetry:
  provider: stdout
