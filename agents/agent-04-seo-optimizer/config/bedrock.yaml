# AWS overlay for Agent 04 - interface-complete stub target.
# Deep-merges over base.yaml. Provider bodies live in packages/core.

provider: bedrock

llm:
  provider: bedrock
  region: us-east-1
  tier_models:
    cheap: bedrock/anthropic.claude-3-5-haiku-v1:0
    strong: bedrock/anthropic.claude-3-5-sonnet-v2:0

cost:
  is_mock: false
  provider_currency: USD
  fx_rates:
    USD: 83.0
  input_cost_per_token_inr:
    cheap: 0.0
    strong: 0.0
  output_cost_per_token_inr:
    cheap: 0.0
    strong: 0.0
  ceiling_inr: 20.0

object_storage:
  provider: bedrock
  bucket: REPLACE_ME_AT_GO_LIVE
  prefix: seo-optimizer/v1/

secret_store:
  provider: env

telemetry:
  provider: stdout
